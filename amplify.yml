version: 1
backend:
  phases:
    build:
      commands:
        - npm install -g pnpm@9.15.0
        - pnpm install --frozen-lockfile
        - - pnpm exec ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID
frontend:
  phases:
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: apps/frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .turbo/**/*